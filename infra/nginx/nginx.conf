# ─── Nginx Main Configuration ─────────────────────────────────────────────────
# Tuned for 60,000+ concurrent users
# Features: gzip/brotli, HTTP/2, SSL termination, upstream caching, rate limiting

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # ── Core Settings ────────────────────────────────────────────────────────
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  charset utf-8;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 4096;
  server_tokens off;

  # ── Buffer Sizes ─────────────────────────────────────────────────────────
  client_body_buffer_size 128k;
  client_max_body_size 50M;
  client_header_buffer_size 4k;
  large_client_header_buffers 8 64k;

  # ── Timeouts ─────────────────────────────────────────────────────────────
  client_body_timeout 60s;
  client_header_timeout 60s;
  send_timeout 60s;
  proxy_connect_timeout 30s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # ── Gzip Compression ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_buffers 32 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/x-javascript
    application/xml application/xml+rss application/rss+xml
    application/atom+xml application/xhtml+xml
    image/svg+xml image/x-icon
    font/opentype font/ttf font/otf
    application/font-woff application/font-woff2;

  # ── Log Format ───────────────────────────────────────────────────────────
  log_format main_json escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"body_bytes":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"http_x_forwarded_for":"$http_x_forwarded_for",'
      '"upstream_addr":"$upstream_addr"'
    '}';

  access_log /var/log/nginx/access.log main_json;

  # ── Rate Limiting Zones ───────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:20m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_upload:10m rate=2r/s;
  limit_req_zone $binary_remote_addr zone=api_general:20m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ── Proxy Cache ───────────────────────────────────────────────────────────
  proxy_cache_path /var/cache/nginx/api
    levels=1:2
    keys_zone=api_cache:32m
    max_size=1g
    inactive=10m
    use_temp_path=off;

  proxy_cache_path /var/cache/nginx/static
    levels=1:2
    keys_zone=static_cache:64m
    max_size=4g
    inactive=24h
    use_temp_path=off;

  # ── Upstreams ────────────────────────────────────────────────────────────
  upstream mbk_api {
    least_conn;
    server api:5003 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 64;
  }

  upstream mbk_frontend {
    least_conn;
    server frontend:3000 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # Include virtual host configs
  include /etc/nginx/conf.d/*.conf;
}
