# ─── MBK Carrierz Virtual Host ────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name mbktechnologies.info www.mbktechnologies.info trainer.mbktechnologies.info;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Main HTTPS server
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name trainer.mbktechnologies.info mbktechnologies.info www.mbktechnologies.info;

  # ── SSL ─────────────────────────────────────────────────────────────────
  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_session_cache   shared:SSL:50m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;

  # HSTS (6 months)
  add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

  # ── Security Headers ────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;

  # ── Rate Limiting ────────────────────────────────────────────────────────
  limit_conn conn_limit 100;

  # ── API Routes ───────────────────────────────────────────────────────────
  location /api/auth/ {
    limit_req zone=api_auth burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://mbk_api;
    include /etc/nginx/conf.d/proxy-params.conf;
  }

  location /api/upload {
    limit_req zone=api_upload burst=5 nodelay;
    limit_req_status 429;
    client_max_body_size 50M;

    proxy_pass http://mbk_api;
    include /etc/nginx/conf.d/proxy-params.conf;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Health check (no rate limit, no cache)
  location /api/health {
    access_log off;
    proxy_pass http://mbk_api;
    include /etc/nginx/conf.d/proxy-params.conf;
  }

  location /api/ {
    limit_req zone=api_general burst=50 nodelay;
    limit_req_status 429;

    # Cache GET responses for 30s (public data only)
    proxy_cache api_cache;
    proxy_cache_valid 200 30s;
    proxy_cache_valid 404 1m;
    proxy_cache_methods GET HEAD;
    proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
    proxy_cache_bypass $http_pragma $http_authorization $cookie_session;
    proxy_no_cache $http_pragma $http_authorization $cookie_session;
    add_header X-Cache-Status $upstream_cache_status always;

    proxy_pass http://mbk_api;
    include /etc/nginx/conf.d/proxy-params.conf;
  }

  # WebSocket (Socket.io)
  location /socket.io/ {
    proxy_pass http://mbk_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # Static uploads (bypass Next.js, serve directly through proxy with long cache)
  location /uploads/ {
    proxy_pass http://mbk_api;
    include /etc/nginx/conf.d/proxy-params.conf;
    proxy_cache static_cache;
    proxy_cache_valid 200 24h;
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    add_header X-Cache-Status $upstream_cache_status always;
  }

  # Next.js static assets — immutable cache
  location /_next/static/ {
    proxy_pass http://mbk_frontend;
    include /etc/nginx/conf.d/proxy-params.conf;
    proxy_cache static_cache;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Cache-Status $upstream_cache_status always;
  }

  # All other requests → Next.js frontend
  location / {
    limit_req zone=general burst=60 nodelay;

    proxy_pass http://mbk_frontend;
    include /etc/nginx/conf.d/proxy-params.conf;
    proxy_read_timeout 30s;
  }
}
