# Render Blueprint — MBK backend API
# Dashboard: New > Blueprint > connect repo, or set these manually on the Web Service.
#
# If you see "failed to read dockerfile: open npm install":
#   Settings > Environment = Node (NOT Docker)
#   Root Directory = backend
#   Build Command = npm install
#   Start Command = npm start
#
# Required in Render dashboard (not committed):
# GOOGLE_SERVICE_ACCOUNT_JSON, GOOGLE_DRIVE_FOLDER_ID, EMAIL_USER, EMAIL_PASS
# JWT_SECRET, SESSION_SECRET, MONGODB_URI, FRONTEND_URL, BACKEND_URL
# STREAM_CHAT_API_KEY, STREAM_CHAT_API_SECRET (optional chat)
# PLIVO_AUTH_ID, PLIVO_AUTH_TOKEN, PLIVO_SOURCE_NUMBER (optional SMS; trainer OTP uses email)

services:
  - type: web
    name: mbk-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: drive_only
      - key: DISABLE_LOCAL_FILE_FALLBACK
        value: "1"
      - key: DISABLE_REDIS
        value: "1"
      - key: ALLOW_OTP_DEBUG
        value: "0"
