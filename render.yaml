# Render Blueprint — MBK backend API
# Dashboard: New > Blueprint > connect repo, or set these manually on the Web Service.
#
# If you see "failed to read dockerfile: open npm install":
#   Settings > Environment = Node (NOT Docker)
#   Root Directory = backend
#   Build Command = npm install
#   Start Command = npm start
#
# Required in Render dashboard (not committed):
# GOOGLE_SERVICE_ACCOUNT_JSON, GOOGLE_DRIVE_FOLDER_ID, MONGODB_URI
# JWT_SECRET, SESSION_SECRET, FRONTEND_URL, BACKEND_URL
# Email — Render FREE blocks SMTP. Use Gmail API (same Google account, works on free tier):
#   Enable Gmail API in Google Cloud Console
#   GOOGLE_DRIVE_CLIENT_ID / GOOGLE_DRIVE_CLIENT_SECRET (same as Drive OAuth)
#   GOOGLE_GMAIL_REFRESH_TOKEN=<run backend/scripts/getGmailRefreshToken.js>
#   EMAIL_USER=mbkdrive82@gmail.com
#   EMAIL_FROM="MBK Carrierz" <mbkdrive82@gmail.com>
#   GOOGLE_DRIVE_OAUTH_REDIRECT_URI=https://mbk-project-spf5.onrender.com/oauth2callback
# Browser setup: https://mbk-project-spf5.onrender.com/api/oauth/gmail/help
# Paid Render only: EMAIL_PASS Gmail App Password + SMTP_HOST=smtp.gmail.com

services:
  - type: web
    name: mbk-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: drive_only
      - key: DISABLE_LOCAL_FILE_FALLBACK
        value: "1"
      - key: DISABLE_REDIS
        value: "1"
      - key: ALLOW_OTP_DEBUG
        value: "0"
