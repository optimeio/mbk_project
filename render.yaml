# Render Blueprint — MBK backend API
# Dashboard: New > Blueprint > connect repo, or set these manually on the Web Service.
#
# If you see "failed to read dockerfile: open npm install":
#   Settings > Environment = Node (NOT Docker)
#   Root Directory = backend
#   Build Command = npm install
#   Start Command = npm start
#
# Required in Render dashboard (not committed):
# GOOGLE_SERVICE_ACCOUNT_JSON, GOOGLE_DRIVE_FOLDER_ID, MONGODB_URI
# JWT_SECRET, SESSION_SECRET, FRONTEND_URL, BACKEND_URL
# Email on Render FREE — SMTP ports 465/587 are BLOCKED. Use Brevo HTTPS API:
#   BREVO_API_KEY=<from brevo.com → SMTP & API → API Keys>
#   EMAIL_FROM="MBK Carrierz" <official@mbktechnologies.info>
# Verify official@mbktechnologies.info as sender in Brevo first.
# OR upgrade Render to paid plan to use Hostinger SMTP (EMAIL_USER/EMAIL_PASS).

services:
  - type: web
    name: mbk-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: drive_only
      - key: DISABLE_LOCAL_FILE_FALLBACK
        value: "1"
      - key: DISABLE_REDIS
        value: "1"
      - key: ALLOW_OTP_DEBUG
        value: "0"
